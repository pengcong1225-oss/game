<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 小小英雄积分榜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        /* 星星背景动画 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* 标题区域 */
        .header {
            text-align: center;
            padding: 30px 0;
            animation: slideDown 0.8s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header h1 {
            font-size: 3rem;
            background: linear-gradient(90deg, #f39c12, #e74c3c, #f39c12);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
            text-shadow: 0 0 30px rgba(243, 156, 18, 0.5);
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        .header p {
            color: #8892b0;
            margin-top: 10px;
            font-size: 1.1rem;
        }

        /* 统计卡片区域 */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
            animation: fadeIn 0.6s ease backwards;
        }

        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.3s; }
        .stat-card:nth-child(4) { animation-delay: 0.4s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border-color: rgba(243, 156, 18, 0.5);
        }

        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(90deg, #f39c12, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            color: #8892b0;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        /* 主要内容区域 */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 30px;
        }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .panel-title {
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 按钮样式 */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f39c12, #e74c3c);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(243, 156, 18, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: #fff;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(46, 204, 113, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: #fff;
            padding: 8px 12px;
        }

        .btn-danger:hover {
            transform: scale(1.05);
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.8rem;
        }

        /* 数据管理区域 */
        .data-toolbar {
            background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .data-toolbar-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .data-toolbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .data-toolbar-right {
            color: #8892b0;
            font-size: 0.85rem;
        }

        /* 目标列表 */
        .goal-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .goal-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .goal-item:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(243, 156, 18, 0.3);
        }

        .goal-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .goal-icon {
            font-size: 1.8rem;
        }

        .goal-details h4 {
            font-size: 1rem;
            margin-bottom: 3px;
        }

        .goal-points {
            background: linear-gradient(135deg, #f39c12, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .goal-actions {
            display: flex;
            gap: 8px;
        }

        /* 记录列表 */
        .record-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .record-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .record-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .record-icon {
            font-size: 1.5rem;
        }

        .record-details h4 {
            font-size: 0.95rem;
        }

        .record-date {
            color: #8892b0;
            font-size: 0.8rem;
        }

        .record-points {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 25px;
            padding: 30px;
            width: 90%;
            max-width: 450px;
            border: 1px solid rgba(255,255,255,0.1);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-title {
            font-size: 1.3rem;
        }

        .modal-close {
            background: none;
            border: none;
            color: #8892b0;
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s;
        }

        .modal-close:hover {
            color: #e74c3c;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ccd6f6;
            font-size: 0.9rem;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #f39c12;
            box-shadow: 0 0 15px rgba(243, 156, 18, 0.3);
        }

        .form-group select option {
            background: #1a1a2e;
        }

        .icon-picker {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 10px;
            margin-top: 8px;
        }

        .icon-option {
            padding: 10px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            cursor: pointer;
            text-align: center;
            font-size: 1.3rem;
            transition: all 0.3s;
        }

        .icon-option:hover {
            border-color: #f39c12;
            background: rgba(243, 156, 18, 0.1);
        }

        .icon-option.selected {
            border-color: #f39c12;
            background: rgba(243, 156, 18, 0.2);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #8892b0;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        /* 进度条 */
        .progress-container {
            margin-top: 20px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .progress-bar {
            height: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #f39c12, #e74c3c);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        /* 时间筛选 */
        .time-filter {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            background: transparent;
            color: #8892b0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: rgba(243, 156, 18, 0.2);
            border-color: #f39c12;
            color: #f39c12;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.3);
        }

        /* 成功动画 */
        .success-animation {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            z-index: 2000;
            animation: successPop 0.6s ease forwards;
            pointer-events: none;
        }

        @keyframes successPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .stats-container {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .stat-card {
                padding: 15px;
            }
            
            .stat-value {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- 星星背景 -->
    <div class="stars" id="stars"></div>

    <div class="container">
        <!-- 标题 -->
        <div class="header">
            <h1>🏆 小小英雄积分榜 <span id="syncStatus" style="font-size:0.4em;vertical-align:middle;"></span></h1>
            <p>每一次努力，都是成长的足迹 ✨</p>
            <a href="index.html" style="display: inline-block; margin-top: 16px; padding: 10px 28px; background: linear-gradient(135deg, #E0001D, #B8001A); color: #fff; text-decoration: none; border-radius: 25px; font-weight: 700; font-size: 0.95rem; transition: all 0.3s; box-shadow: 0 4px 15px rgba(224,0,29,0.4);"
               onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 8px 25px rgba(224,0,29,0.55)';"
               onmouseout="this.style.transform='translateY(0)';this.style.boxShadow='0 4px 15px rgba(224,0,29,0.4)';"
            >🎮 去盲盒抽奖</a>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-icon">⭐</div>
                <div class="stat-value" id="totalPoints">0</div>
                <div class="stat-label">可用积分</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🎯</div>
                <div class="stat-value" id="totalTasks">0</div>
                <div class="stat-label">完成任务</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📅</div>
                <div class="stat-value" id="todayPoints">0</div>
                <div class="stat-label">今日积分</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🔥</div>
                <div class="stat-value" id="streak">0</div>
                <div class="stat-label">连续天数</div>
            </div>
        </div>

        <!-- 数据管理工具栏 -->
        <div class="panel" style="margin-bottom: 20px; padding: 15px 25px;">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span style="color: #8892b0;">💾 全量备份：</span>
                    <button class="btn btn-success btn-small" onclick="exportData()">📤 导出备份</button>
                    <button class="btn btn-primary btn-small" onclick="document.getElementById('importFile').click()">📥 恢复备份</button>
                    <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importData(event)">
                </div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span style="color: #8892b0; font-size: 0.85rem;" id="lastBackupTime">未备份</span>
                    <span style="color: #8892b0;">|</span>
                    <span style="color: #f39c12; font-size: 0.85rem;">📊 累计获得: <strong id="totalEarnedDisplay">0</strong></span>
                </div>
            </div>
        </div>

        <!-- 目标进度 -->
        <div class="panel" style="margin-bottom: 30px;">
            <div class="panel-header">
                <div class="panel-title">🎯 积分目标进度</div>
                <button class="btn btn-primary btn-small" onclick="openSettingsModal()">⚙️ 设置目标</button>
            </div>
            <div class="progress-container">
                <div class="progress-header">
                    <span id="progressText">距离下一个奖励</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- 主要内容 -->
        <div class="main-content">
            <!-- 目标配置面板 -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">📋 任务目标库</div>
                    <button class="btn btn-primary" onclick="openGoalModal()">➕ 添加目标</button>
                </div>
                <div class="goal-list" id="goalList">
                    <!-- 目标列表将动态生成 -->
                </div>
            </div>

            <!-- 完成记录面板 -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">📝 完成记录</div>
                    <button class="btn btn-success" onclick="openCompleteModal()">✅ 记录完成</button>
                </div>
                <div class="time-filter">
                    <button class="filter-btn active" onclick="filterRecords('all', this)">全部</button>
                    <button class="filter-btn" onclick="filterRecords('today', this)">今日</button>
                    <button class="filter-btn" onclick="filterRecords('week', this)">本周</button>
                    <button class="filter-btn" onclick="filterRecords('month', this)">本月</button>
                </div>
                <div class="record-list" id="recordList">
                    <!-- 记录列表将动态生成 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 添加目标模态框 -->
    <div class="modal-overlay" id="goalModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">🎯 添加新目标</h3>
                <button class="modal-close" onclick="closeGoalModal()">×</button>
            </div>
            <form id="goalForm" onsubmit="saveGoal(event)">
                <div class="form-group">
                    <label>目标名称</label>
                    <input type="text" id="goalName" placeholder="例如：阅读30分钟" required>
                </div>
                <div class="form-group">
                    <label>积分值</label>
                    <input type="number" id="goalPoints" placeholder="例如：10" min="1" max="100" required>
                </div>
                <div class="form-group">
                    <label>选择图标</label>
                    <div class="icon-picker" id="iconPicker">
                        <div class="icon-option selected" data-icon="📚">📚</div>
                        <div class="icon-option" data-icon="🏃">🏃</div>
                        <div class="icon-option" data-icon="🧹">🧹</div>
                        <div class="icon-option" data-icon="✏️">✏️</div>
                        <div class="icon-option" data-icon="🎨">🎨</div>
                        <div class="icon-option" data-icon="🎵">🎵</div>
                        <div class="icon-option" data-icon="💪">💪</div>
                        <div class="icon-option" data-icon="🌟">🌟</div>
                        <div class="icon-option" data-icon="📖">📖</div>
                        <div class="icon-option" data-icon="🚴">🚴</div>
                        <div class="icon-option" data-icon="🧠">🧠</div>
                        <div class="icon-option" data-icon="⚽">⚽</div>
                        <div class="icon-option" data-icon="🎹">🎹</div>
                        <div class="icon-option" data-icon="🔬">🔬</div>
                        <div class="icon-option" data-icon="🌍">🌍</div>
                        <div class="icon-option" data-icon="🏆">🏆</div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">💾 保存目标</button>
            </form>
        </div>
    </div>

    <!-- 记录完成模态框 -->
    <div class="modal-overlay" id="completeModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">✅ 记录任务完成</h3>
                <button class="modal-close" onclick="closeCompleteModal()">×</button>
            </div>
            <form id="completeForm" onsubmit="saveRecord(event)">
                <div class="form-group">
                    <label>选择完成的任务</label>
                    <select id="taskSelect" required>
                        <option value="">请选择...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>完成时间</label>
                    <input type="datetime-local" id="completeTime">
                </div>
                <div class="form-group">
                    <label>备注（可选）</label>
                    <input type="text" id="recordNote" placeholder="今天表现很棒！">
                </div>
                <button type="submit" class="btn btn-success" style="width: 100%; justify-content: center;">🎉 确认完成</button>
            </form>
        </div>
    </div>

    <!-- 设置目标模态框 -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">⚙️ 设置积分目标</h3>
                <button class="modal-close" onclick="closeSettingsModal()">×</button>
            </div>
            <form id="settingsForm" onsubmit="saveSettings(event)">
                <div class="form-group">
                    <label>目标积分</label>
                    <input type="number" id="targetPoints" placeholder="例如：100" min="1" required>
                </div>
                <div class="form-group">
                    <label>奖励内容</label>
                    <input type="text" id="rewardText" placeholder="例如：去游乐园玩">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">💾 保存设置</button>
            </form>
        </div>
    </div>

    <script>
        // 数据存储
        let goals = [];
        let records = [];
        let settings = {
            targetPoints: 100,
            rewardText: '神秘奖励'
        };

        // ===== 共享积分 =====
        const SHARED_POINTS_KEY = 'sharedPoints';

        function getSharedPoints() {
            const val = localStorage.getItem(SHARED_POINTS_KEY);
            if (val === null) return null;
            const num = parseInt(val, 10);
            return isNaN(num) ? null : num;
        }

        function setSharedPoints(val) {
            localStorage.setItem(SHARED_POINTS_KEY, String(Math.max(0, val)));
        }

        function syncSharedPointsFromRecords() {
            // If no sharedPoints yet, calculate from existing records
            if (getSharedPoints() === null) {
                const total = records.reduce((sum, r) => sum + r.points, 0);
                setSharedPoints(total);
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 立即从 localStorage 加载，页面秒开
            loadData();
            syncSharedPointsFromRecords();
            renderGoals();
            renderRecords();
            updateStats();
            createStars();
            initIconPicker();
            setDefaultDateTime();
            restoreBackupTime();
            updateSyncIndicator();

            // 后台同步服务器数据（不阻塞）
            initApiSync().then(() => {
                loadData();
                syncSharedPointsFromRecords();
                updateSyncIndicator();
                renderGoals();
                renderRecords();
                updateStats();
            });
        });

        // 创建星星背景
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                starsContainer.appendChild(star);
            }
        }

        // 图标选择器
        function initIconPicker() {
            const icons = document.querySelectorAll('.icon-option');
            icons.forEach(icon => {
                icon.addEventListener('click', function() {
                    icons.forEach(i => i.classList.remove('selected'));
                    this.classList.add('selected');
                });
            });
        }

        // 设置默认日期时间
        function setDefaultDateTime() {
            const now = new Date();
            const offset = now.getTimezoneOffset();
            const localTime = new Date(now.getTime() - offset * 60000);
            document.getElementById('completeTime').value = localTime.toISOString().slice(0, 16);
        }

        // 本地存储 + 服务端同步
        function saveData() {
            localStorage.setItem('pointsGoals', JSON.stringify(goals));
            localStorage.setItem('pointsRecords', JSON.stringify(records));
            localStorage.setItem('pointsSettings', JSON.stringify(settings));

            if (typeof apiSaveData === 'function' && typeof buildFullData === 'function') {
                const blindBoxData = JSON.parse(localStorage.getItem('ultraman-blindbox') || 'null');
                const sharedPoints = getSharedPoints();
                const fullData = buildFullData(sharedPoints, blindBoxData, {
                    goals: goals,
                    records: records,
                    settings: settings,
                });
                apiSaveData(fullData).then(() => updateSyncIndicator());
            }
        }

        function loadData() {
            const savedGoals = localStorage.getItem('pointsGoals');
            const savedRecords = localStorage.getItem('pointsRecords');
            const savedSettings = localStorage.getItem('pointsSettings');

            if (savedGoals) {
                goals = JSON.parse(savedGoals);
            } else {
                // 预设示例目标
                goals = [
                    { id: 1, name: '阅读30分钟', points: 10, icon: '📚' },
                    { id: 2, name: '完成作业', points: 15, icon: '✏️' },
                    { id: 3, name: '整理房间', points: 8, icon: '🧹' },
                    { id: 4, name: '运动30分钟', points: 12, icon: '🏃' },
                    { id: 5, name: '练习钢琴', points: 10, icon: '🎹' },
                    { id: 6, name: '帮助做家务', points: 8, icon: '🏠' },
                    { id: 7, name: '早睡早起', points: 5, icon: '⏰' },
                    { id: 8, name: '自己收拾书包', points: 5, icon: '🎒' }
                ];
            }

            if (savedRecords) {
                records = JSON.parse(savedRecords);
            }

            if (savedSettings) {
                settings = JSON.parse(savedSettings);
            }
        }

        // 渲染目标列表
        function renderGoals() {
            const container = document.getElementById('goalList');
            
            if (goals.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>还没有添加目标<br>点击上方按钮添加第一个目标吧！</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = goals.map(goal => `
                <div class="goal-item">
                    <div class="goal-info">
                        <span class="goal-icon">${goal.icon}</span>
                        <div class="goal-details">
                            <h4>${goal.name}</h4>
                            <span class="goal-points">+${goal.points} 积分</span>
                        </div>
                    </div>
                    <div class="goal-actions">
                        <button class="btn btn-success btn-small" onclick="quickComplete(${goal.id})">✓</button>
                        <button class="btn btn-danger btn-small" onclick="deleteGoal(${goal.id})">🗑</button>
                    </div>
                </div>
            `).join('');
        }

        // 渲染记录列表
        let currentFilter = 'all';

        function renderRecords() {
            const container = document.getElementById('recordList');
            let filteredRecords = [...records];

            // 应用筛选
            const now = new Date();
            if (currentFilter === 'today') {
                filteredRecords = records.filter(r => {
                    const date = new Date(r.time);
                    return date.toDateString() === now.toDateString();
                });
            } else if (currentFilter === 'week') {
                const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
                filteredRecords = records.filter(r => new Date(r.time) >= weekAgo);
            } else if (currentFilter === 'month') {
                const monthAgo = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
                filteredRecords = records.filter(r => new Date(r.time) >= monthAgo);
            }

            // 按时间倒序排列
            filteredRecords.sort((a, b) => new Date(b.time) - new Date(a.time));

            if (filteredRecords.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <p>暂无完成记录<br>完成任务后会在这里显示</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredRecords.map(record => {
                const date = new Date(record.time);
                const timeStr = `${date.getMonth()+1}/${date.getDate()} ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
                return `
                    <div class="record-item">
                        <div class="record-info">
                            <span class="record-icon">${record.icon}</span>
                            <div class="record-details">
                                <h4>${record.name}</h4>
                                <span class="record-date">${timeStr}${record.note ? ' · ' + record.note : ''}</span>
                            </div>
                        </div>
                        <span class="record-points">+${record.points}</span>
                    </div>
                `;
            }).join('');
        }

        // 筛选记录
        function filterRecords(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderRecords();
        }

        // 更新统计
        function updateStats() {
            const totalEarned = records.reduce((sum, r) => sum + r.points, 0);
            const sharedPoints = getSharedPoints();
            const availablePoints = sharedPoints !== null ? sharedPoints : totalEarned;
            document.getElementById('totalPoints').textContent = availablePoints;
            document.getElementById('totalTasks').textContent = records.length;
            document.getElementById('totalEarnedDisplay').textContent = totalEarned;

            // 今日积分
            const today = new Date().toDateString();
            const todayPoints = records
                .filter(r => new Date(r.time).toDateString() === today)
                .reduce((sum, r) => sum + r.points, 0);
            document.getElementById('todayPoints').textContent = todayPoints;

            // 连续天数
            const streak = calculateStreak();
            document.getElementById('streak').textContent = streak;

            // 进度条 - 使用可用积分（共享积分）
            const progress = Math.min((availablePoints / settings.targetPoints) * 100, 100);
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressPercent').textContent = Math.round(progress) + '%';
            document.getElementById('progressText').textContent = progress >= 100
                ? '🎉 已达成目标！'
                : `距离「${settings.rewardText}」还需 ${settings.targetPoints - availablePoints} 积分`;

            // 更新任务选择下拉框
            const select = document.getElementById('taskSelect');
            select.innerHTML = '<option value="">请选择...</option>' + 
                goals.map(g => `<option value="${g.id}">${g.icon} ${g.name} (+${g.points})</option>`).join('');
        }

        // 计算连续天数
        function calculateStreak() {
            if (records.length === 0) return 0;
            
            const dates = [...new Set(records.map(r => new Date(r.time).toDateString()))];
            dates.sort((a, b) => new Date(b) - new Date(a));
            
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            let streak = 0;
            let checkDate = new Date(today);
            
            for (let i = 0; i < dates.length; i++) {
                const recordDate = new Date(dates[i]);
                recordDate.setHours(0, 0, 0, 0);
                
                if (recordDate.getTime() === checkDate.getTime() || 
                    recordDate.getTime() === checkDate.getTime() - 86400000) {
                    streak++;
                    checkDate = new Date(recordDate);
                } else {
                    break;
                }
            }
            
            return streak;
        }

        // 模态框操作
        function openGoalModal() {
            document.getElementById('goalModal').classList.add('active');
            document.getElementById('goalForm').reset();
            document.querySelectorAll('.icon-option').forEach(i => i.classList.remove('selected'));
            document.querySelector('.icon-option').classList.add('selected');
        }

        function closeGoalModal() {
            document.getElementById('goalModal').classList.remove('active');
        }

        function openCompleteModal() {
            if (goals.length === 0) {
                alert('请先添加目标！');
                return;
            }
            document.getElementById('completeModal').classList.add('active');
            setDefaultDateTime();
        }

        function closeCompleteModal() {
            document.getElementById('completeModal').classList.remove('active');
        }

        function openSettingsModal() {
            document.getElementById('settingsModal').classList.add('active');
            document.getElementById('targetPoints').value = settings.targetPoints;
            document.getElementById('rewardText').value = settings.rewardText;
        }

        function closeSettingsModal() {
            document.getElementById('settingsModal').classList.remove('active');
        }

        // 保存目标
        function saveGoal(e) {
            e.preventDefault();
            const name = document.getElementById('goalName').value.trim();
            const points = parseInt(document.getElementById('goalPoints').value);
            const icon = document.querySelector('.icon-option.selected').dataset.icon;

            const newGoal = {
                id: Date.now(),
                name,
                points,
                icon
            };

            goals.push(newGoal);
            saveData();
            renderGoals();
            updateStats();
            closeGoalModal();
            showSuccess('🎯');
        }

        // 删除目标
        function deleteGoal(id) {
            if (confirm('确定要删除这个目标吗？')) {
                goals = goals.filter(g => g.id !== id);
                saveData();
                renderGoals();
                updateStats();
            }
        }

        // 快速完成
        function quickComplete(goalId) {
            const goal = goals.find(g => g.id === goalId);
            if (!goal) return;

            const record = {
                id: Date.now(),
                goalId: goal.id,
                name: goal.name,
                points: goal.points,
                icon: goal.icon,
                time: new Date().toISOString(),
                note: ''
            };

            records.push(record);
            addPointsToShared(goal.points);
            saveData();
            renderRecords();
            updateStats();
            showSuccess('✅');
        }

        function addPointsToShared(amount) {
            const current = getSharedPoints();
            const base = current !== null ? current : 0;
            setSharedPoints(base + amount);
        }

        // 保存记录
        function saveRecord(e) {
            e.preventDefault();
            const goalId = parseInt(document.getElementById('taskSelect').value);
            const goal = goals.find(g => g.id === goalId);
            if (!goal) return;

            const time = document.getElementById('completeTime').value;
            const note = document.getElementById('recordNote').value.trim();

            const record = {
                id: Date.now(),
                goalId: goal.id,
                name: goal.name,
                points: goal.points,
                icon: goal.icon,
                time: new Date(time).toISOString(),
                note
            };

            records.push(record);
            addPointsToShared(goal.points);
            saveData();
            renderRecords();
            updateStats();
            closeCompleteModal();
            showSuccess('🎉');
        }

        // 保存设置
        function saveSettings(e) {
            e.preventDefault();
            settings.targetPoints = parseInt(document.getElementById('targetPoints').value);
            settings.rewardText = document.getElementById('rewardText').value.trim() || '神秘奖励';
            saveData();
            updateStats();
            closeSettingsModal();
        }

        // 成功动画
        function showSuccess(emoji) {
            const el = document.createElement('div');
            el.className = 'success-animation';
            el.textContent = emoji;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 600);
        }

        // ========== 数据导出/导入功能 ==========
        
        // 导出数据为JSON文件（全量备份）
        function exportData() {
            const blindBoxData = JSON.parse(localStorage.getItem('ultraman-blindbox') || 'null');
            const data = {
                version: '2.0',
                exportTime: new Date().toISOString(),
                sharedPoints: getSharedPoints(),
                blindBox: blindBoxData,
                tracker: {
                    goals: goals,
                    records: records,
                    settings: settings
                }
            };

            const jsonStr = JSON.stringify(data, null, 2);
            const blob = new Blob([jsonStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);

            const date = new Date();
            const dateStr = `${date.getFullYear()}${(date.getMonth()+1).toString().padStart(2,'0')}${date.getDate().toString().padStart(2,'0')}`;
            const filename = `全量备份_${dateStr}.json`;

            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            document.getElementById('lastBackupTime').textContent = `上次导出: ${date.toLocaleString('zh-CN')}`;
            localStorage.setItem('lastBackupTime', date.toISOString());

            showSuccess('📤');
        }

        // 导入数据（支持 v1.0 和 v2.0 全量备份）
        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);

                    if (data.version === '2.0' && data.tracker) {
                        // v2.0 全量备份
                        const totalEarned = data.tracker.records.reduce((sum, r) => sum + r.points, 0);

                        const confirmMsg = `确定要导入全量备份吗？\n\n` +
                            `📁 文件: ${file.name}\n` +
                            `📅 备份时间: ${data.exportTime ? new Date(data.exportTime).toLocaleString('zh-CN') : '未知'}\n` +
                            `⭐ 可用积分: ${data.sharedPoints ?? 0}\n` +
                            `📋 任务目标数: ${data.tracker.goals.length}\n` +
                            `📝 任务记录数: ${data.tracker.records.length}\n` +
                            `🎁 盲盒数据: ${data.blindBox ? '包含' : '无'}\n\n` +
                            `⚠️ 这将覆盖当前所有数据！`;

                        if (!confirm(confirmMsg)) { event.target.value = ''; return; }

                        // 恢复共享积分
                        if (data.sharedPoints !== null && data.sharedPoints !== undefined) {
                            setSharedPoints(data.sharedPoints);
                        } else {
                            setSharedPoints(totalEarned);
                        }

                        // 恢复任务数据
                        goals = data.tracker.goals;
                        records = data.tracker.records;
                        settings = data.tracker.settings;

                        // 恢复盲盒数据
                        if (data.blindBox) {
                            localStorage.setItem('ultraman-blindbox', JSON.stringify(data.blindBox));
                        }

                    } else if (data.goals && data.records && data.settings) {
                        // v1.0 旧版任务数据（向后兼容）
                        const totalEarned = data.records.reduce((sum, r) => sum + r.points, 0);

                        const confirmMsg = `确定要导入数据吗？\n\n` +
                            `📁 文件: ${file.name}\n` +
                            `📋 目标数: ${data.goals.length}\n` +
                            `📝 记录数: ${data.records.length}\n` +
                            `⭐ 总积分: ${totalEarned}\n\n` +
                            `⚠️ 这将覆盖当前任务数据！`;

                        if (!confirm(confirmMsg)) { event.target.value = ''; return; }

                        goals = data.goals;
                        records = data.records;
                        settings = data.settings;
                        setSharedPoints(totalEarned);
                    } else {
                        alert('❌ 无效的数据文件格式！');
                        event.target.value = '';
                        return;
                    }

                    // 保存并刷新
                    saveData();
                    renderGoals();
                    renderRecords();
                    updateStats();

                    showSuccess('📥');
                    alert('✅ 数据导入成功！');

                } catch (err) {
                    alert('❌ 文件解析失败，请确保是有效的JSON文件！\n\n错误: ' + err.message);
                }
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        // 页面加载时恢复备份时间显示
        function restoreBackupTime() {
            const lastTime = localStorage.getItem('lastBackupTime');
            if (lastTime) {
                const date = new Date(lastTime);
                document.getElementById('lastBackupTime').textContent = `上次导出: ${date.toLocaleString('zh-CN')}`;
            }
        }
    </script>
    <script src="js/api.js"></script>
    <script>
        // api.js 加载后启动后台同步（失败不影响主功能）
        if (typeof initApiSync === 'function') {
            initApiSync().then(() => {
                loadData();
                syncSharedPointsFromRecords();
                updateSyncIndicator();
                renderGoals();
                renderRecords();
                updateStats();
            }).catch(() => {});
        }
    </script>
</body>
</html>
