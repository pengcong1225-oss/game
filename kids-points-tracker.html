<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 小小英雄积分榜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        /* 星星背景动画 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* 标题区域 */
        .header {
            text-align: center;
            padding: 30px 0;
            animation: slideDown 0.8s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header h1 {
            font-size: 3rem;
            background: linear-gradient(90deg, #f39c12, #e74c3c, #f39c12);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
            text-shadow: 0 0 30px rgba(243, 156, 18, 0.5);
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        .header p {
            color: #8892b0;
            margin-top: 10px;
            font-size: 1.1rem;
        }

        /* 统计卡片区域 */
        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
            animation: fadeIn 0.6s ease backwards;
        }

        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.3s; }
        .stat-card:nth-child(4) { animation-delay: 0.4s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border-color: rgba(243, 156, 18, 0.5);
        }

        .stat-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            background: linear-gradient(90deg, #f39c12, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            color: #8892b0;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        /* 主要内容区域 */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 30px;
        }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .panel-title {
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 按钮样式 */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f39c12, #e74c3c);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(243, 156, 18, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: #fff;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(46, 204, 113, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: #fff;
            padding: 8px 12px;
        }

        .btn-danger:hover {
            transform: scale(1.05);
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.8rem;
        }

        /* 数据管理区域 */
        .data-toolbar {
            background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .data-toolbar-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .data-toolbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .data-toolbar-right {
            color: #8892b0;
            font-size: 0.85rem;
        }

        /* 目标列表 */
        .goal-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .goal-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .goal-item:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(243, 156, 18, 0.3);
        }

        .goal-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .goal-icon {
            font-size: 1.8rem;
        }

        .goal-details h4 {
            font-size: 1rem;
            margin-bottom: 3px;
        }

        .goal-points {
            background: linear-gradient(135deg, #f39c12, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .goal-actions {
            display: flex;
            gap: 8px;
        }

        .goal-item.completed-today {
            opacity: 0.55;
            border-color: rgba(46, 204, 113, 0.3);
        }

        .done-badge {
            display: inline-block;
            font-size: 0.75rem;
            color: #2ecc71;
            margin-top: 2px;
        }

        .btn-done {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            cursor: not-allowed;
        }

        /* 记录列表 */
        .record-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .record-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .record-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .record-icon {
            font-size: 1.5rem;
        }

        .record-details h4 {
            font-size: 0.95rem;
        }

        .record-date {
            color: #8892b0;
            font-size: 0.8rem;
        }

        .record-points {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 25px;
            padding: 30px;
            width: 90%;
            max-width: 450px;
            border: 1px solid rgba(255,255,255,0.1);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-title {
            font-size: 1.3rem;
        }

        .modal-close {
            background: none;
            border: none;
            color: #8892b0;
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s;
        }

        .modal-close:hover {
            color: #e74c3c;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ccd6f6;
            font-size: 0.9rem;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #f39c12;
            box-shadow: 0 0 15px rgba(243, 156, 18, 0.3);
        }

        .form-group select option {
            background: #1a1a2e;
        }

        .icon-picker {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 10px;
            margin-top: 8px;
        }

        .icon-option {
            padding: 10px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            cursor: pointer;
            text-align: center;
            font-size: 1.3rem;
            transition: all 0.3s;
        }

        .icon-option:hover {
            border-color: #f39c12;
            background: rgba(243, 156, 18, 0.1);
        }

        .icon-option.selected {
            border-color: #f39c12;
            background: rgba(243, 156, 18, 0.2);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #8892b0;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        /* 进度条 */
        .progress-container {
            margin-top: 20px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .progress-bar {
            height: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #f39c12, #e74c3c);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        /* 时间筛选 */
        .time-filter {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            background: transparent;
            color: #8892b0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: rgba(243, 156, 18, 0.2);
            border-color: #f39c12;
            color: #f39c12;
        }

        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.3);
        }

        /* 成功动画 */
        .success-animation {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            z-index: 2000;
            animation: successPop 0.6s ease forwards;
            pointer-events: none;
        }

        @keyframes successPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .stats-container {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .stat-card {
                padding: 15px;
            }
            
            .stat-value {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- 星星背景 -->
    <div class="stars" id="stars"></div>

    <div class="container">
        <!-- 标题 -->
        <div class="header">
            <h1>🏆 小小英雄积分榜 <span id="syncStatus" style="font-size:0.4em;vertical-align:middle;"></span></h1>
            <p>每一次努力，都是成长的足迹 ✨</p>
            <a href="index.html" style="display: inline-block; margin-top: 16px; padding: 10px 28px; background: linear-gradient(135deg, #E0001D, #B8001A); color: #fff; text-decoration: none; border-radius: 25px; font-weight: 700; font-size: 0.95rem; transition: all 0.3s; box-shadow: 0 4px 15px rgba(224,0,29,0.4);"
               onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 8px 25px rgba(224,0,29,0.55)';"
               onmouseout="this.style.transform='translateY(0)';this.style.boxShadow='0 4px 15px rgba(224,0,29,0.4)';"
            >🎮 去盲盒抽奖</a>
        </div>

        <!-- 统计卡片 -->
        <div class="stats-container">
            <div class="stat-card">
                <div class="stat-icon">⭐</div>
                <div class="stat-value" id="totalPoints">0</div>
                <div class="stat-label">可用积分</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🎯</div>
                <div class="stat-value" id="totalTasks">0</div>
                <div class="stat-label">完成任务</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📅</div>
                <div class="stat-value" id="todayPoints">0</div>
                <div class="stat-label">今日积分</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🔥</div>
                <div class="stat-value" id="streak">0</div>
                <div class="stat-label">连续天数</div>
            </div>
        </div>

        <!-- 数据管理工具栏 -->
        <div class="panel" style="margin-bottom: 20px; padding: 15px 25px;">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span style="color: #8892b0;">💾 全量备份：</span>
                    <button class="btn btn-success btn-small" onclick="exportData()">📤 导出备份</button>
                    <button class="btn btn-primary btn-small" onclick="document.getElementById('importFile').click()">📥 恢复备份</button>
                    <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importData(event)">
                </div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span style="color: #8892b0; font-size: 0.85rem;" id="lastBackupTime">未备份</span>
                    <span style="color: #8892b0;">|</span>
                    <span style="color: #f39c12; font-size: 0.85rem;">📊 累计获得: <strong id="totalEarnedDisplay">0</strong></span>
                </div>
            </div>
        </div>

        <!-- 目标进度 -->
        <div class="panel" style="margin-bottom: 30px;">
            <div class="panel-header">
                <div class="panel-title">🎯 积分目标进度</div>
                <button class="btn btn-primary btn-small" onclick="openSettingsModal()">⚙️ 设置目标</button>
            </div>
            <div class="progress-container">
                <div class="progress-header">
                    <span id="progressText">距离下一个奖励</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- 主要内容 -->
        <div class="main-content">
            <!-- 目标配置面板 -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">📋 任务目标库</div>
                    <button class="btn btn-primary" onclick="openGoalModal()">➕ 添加目标</button>
                </div>
                <div class="goal-list" id="goalList">
                    <!-- 目标列表将动态生成 -->
                </div>
            </div>

            <!-- 完成记录面板 -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">📝 完成记录</div>
                    <button class="btn btn-success" onclick="openCompleteModal()">✅ 记录完成</button>
                </div>
                <div class="time-filter">
                    <button class="filter-btn active" onclick="filterRecords('all', this)">全部</button>
                    <button class="filter-btn" onclick="filterRecords('today', this)">今日</button>
                    <button class="filter-btn" onclick="filterRecords('week', this)">本周</button>
                    <button class="filter-btn" onclick="filterRecords('month', this)">本月</button>
                </div>
                <div class="record-list" id="recordList">
                    <!-- 记录列表将动态生成 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 添加目标模态框 -->
    <div class="modal-overlay" id="goalModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">🎯 添加新目标</h3>
                <button class="modal-close" onclick="closeGoalModal()">×</button>
            </div>
            <form id="goalForm" onsubmit="saveGoal(event)">
                <div class="form-group">
                    <label>目标名称</label>
                    <input type="text" id="goalName" placeholder="例如：阅读30分钟" required>
                </div>
                <div class="form-group">
                    <label>积分值</label>
                    <input type="number" id="goalPoints" placeholder="例如：10" min="1" max="100" required>
                </div>
                <div class="form-group">
                    <label>选择图标</label>
                    <div class="icon-picker" id="iconPicker">
                        <div class="icon-option selected" data-icon="📚">📚</div>
                        <div class="icon-option" data-icon="🏃">🏃</div>
                        <div class="icon-option" data-icon="🧹">🧹</div>
                        <div class="icon-option" data-icon="✏️">✏️</div>
                        <div class="icon-option" data-icon="🎨">🎨</div>
                        <div class="icon-option" data-icon="🎵">🎵</div>
                        <div class="icon-option" data-icon="💪">💪</div>
                        <div class="icon-option" data-icon="🌟">🌟</div>
                        <div class="icon-option" data-icon="📖">📖</div>
                        <div class="icon-option" data-icon="🚴">🚴</div>
                        <div class="icon-option" data-icon="🧠">🧠</div>
                        <div class="icon-option" data-icon="⚽">⚽</div>
                        <div class="icon-option" data-icon="🎹">🎹</div>
                        <div class="icon-option" data-icon="🔬">🔬</div>
                        <div class="icon-option" data-icon="🌍">🌍</div>
                        <div class="icon-option" data-icon="🏆">🏆</div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">💾 保存目标</button>
            </form>
        </div>
    </div>

    <!-- 记录完成模态框 -->
    <div class="modal-overlay" id="completeModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">✅ 记录任务完成</h3>
                <button class="modal-close" onclick="closeCompleteModal()">×</button>
            </div>
            <form id="completeForm" onsubmit="saveRecord(event)">
                <div class="form-group">
                    <label>选择完成的任务</label>
                    <select id="taskSelect" required>
                        <option value="">请选择...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>完成时间</label>
                    <input type="datetime-local" id="completeTime">
                </div>
                <div class="form-group">
                    <label>备注（可选）</label>
                    <input type="text" id="recordNote" placeholder="今天表现很棒！">
                </div>
                <button type="submit" class="btn btn-success" style="width: 100%; justify-content: center;">🎉 确认完成</button>
            </form>
        </div>
    </div>

    <!-- 设置目标模态框 -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">⚙️ 设置积分目标</h3>
                <button class="modal-close" onclick="closeSettingsModal()">×</button>
            </div>
            <form id="settingsForm" onsubmit="saveSettings(event)">
                <div class="form-group">
                    <label>目标积分</label>
                    <input type="number" id="targetPoints" placeholder="例如：100" min="1" required>
                </div>
                <div class="form-group">
                    <label>奖励内容</label>
                    <input type="text" id="rewardText" placeholder="例如：去游乐园玩">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">💾 保存设置</button>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // 数据存储（服务端 data.json 为唯一数据源）
        let goals = [];
        let records = [];
        let settings = { targetPoints: 100, rewardText: '神秘奖励' };

        // 从服务端数据层加载
        function loadData() {
            const pts = getPoints();
            const points = (pts !== null && pts >= 0) ? pts : 0;

            const tracker = getTracker();
            if (tracker) {
                goals = tracker.goals?.length ? tracker.goals : [];
                records = tracker.records || [];
                settings = tracker.settings || { targetPoints: 100, rewardText: '神秘奖励' };
            }
        }

        // 保存到服务端
        function saveData() {
            if (typeof saveTracker === 'function') {
                saveTracker({ goals: goals, records: records, settings: settings });
            }
        }

        // 初始化（async，必须等待服务器数据加载）
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                await loadAppData();
                document.getElementById('syncStatus').textContent = '🟢 已连接';
            } catch (e) {
                document.getElementById('syncStatus').textContent = '🔴 未连接';
                alert('⚠️ 无法连接到服务器，请确认服务器已启动。\n\n' + e.message);
                return;
            }
            loadData();
            renderGoals();
            renderRecords();
            updateStats();
            createStars();
            initIconPicker();
            setDefaultDateTime();
            document.getElementById('lastBackupTime').textContent = '数据已存储在服务器';
        });

        // 创建星星背景
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                starsContainer.appendChild(star);
            }
        }

        // 图标选择器
        function initIconPicker() {
            const icons = document.querySelectorAll('.icon-option');
            icons.forEach(icon => {
                icon.addEventListener('click', function() {
                    icons.forEach(i => i.classList.remove('selected'));
                    this.classList.add('selected');
                });
            });
        }

        // 设置默认日期时间
        function setDefaultDateTime() {
            const now = new Date();
            const offset = now.getTimezoneOffset();
            const localTime = new Date(now.getTime() - offset * 60000);
            document.getElementById('completeTime').value = localTime.toISOString().slice(0, 16);
        }

        // 检查任务今日是否已完成
        function isTaskCompletedToday(goalId) {
            const today = new Date().toDateString();
            return records.some(r => r.goalId === goalId && new Date(r.time).toDateString() === today);
        }

        // 渲染目标列表
        function renderGoals() {
            const container = document.getElementById('goalList');
            if (goals.length === 0) {
                container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📭</div><p>还没有添加目标<br>点击上方按钮添加第一个目标吧！</p></div>`;
                return;
            }
            container.innerHTML = goals.map(goal => {
                const completed = isTaskCompletedToday(goal.id);
                return `
                <div class="goal-item${completed ? ' completed-today' : ''}">
                    <div class="goal-info">
                        <span class="goal-icon">${goal.icon}</span>
                        <div class="goal-details">
                            <h4>${goal.name}</h4>
                            <span class="goal-points">+${goal.points} 积分</span>
                            ${completed ? '<span class="done-badge">✅ 今日已完成</span>' : ''}
                        </div>
                    </div>
                    <div class="goal-actions">
                        <button class="btn btn-small ${completed ? 'btn-done' : 'btn-success'}"
                                ${completed ? 'disabled' : `onclick="quickComplete(${goal.id})"`}>
                            ${completed ? '✔' : '✓'}
                        </button>
                        <button class="btn btn-danger btn-small" onclick="deleteGoal(${goal.id})">🗑</button>
                    </div>
                </div>`;
            }).join('');
        }

        // 渲染记录列表
        let currentFilter = 'all';

        function renderRecords() {
            const container = document.getElementById('recordList');
            let filteredRecords = [...records];
            const now = new Date();
            if (currentFilter === 'today') {
                filteredRecords = records.filter(r => new Date(r.time).toDateString() === now.toDateString());
            } else if (currentFilter === 'week') {
                const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
                filteredRecords = records.filter(r => new Date(r.time) >= weekAgo);
            } else if (currentFilter === 'month') {
                const monthAgo = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
                filteredRecords = records.filter(r => new Date(r.time) >= monthAgo);
            }
            filteredRecords.sort((a, b) => new Date(b.time) - new Date(a.time));

            if (filteredRecords.length === 0) {
                container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📝</div><p>暂无完成记录<br>完成任务后会在这里显示</p></div>`;
                return;
            }
            container.innerHTML = filteredRecords.map(record => {
                const date = new Date(record.time);
                const timeStr = `${date.getMonth()+1}/${date.getDate()} ${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
                return `<div class="record-item">
                    <div class="record-info"><span class="record-icon">${record.icon}</span>
                    <div class="record-details"><h4>${record.name}</h4><span class="record-date">${timeStr}${record.note ? ' · ' + record.note : ''}</span></div></div>
                    <span class="record-points">+${record.points}</span>
                    <button class="btn btn-danger btn-small" onclick="deleteRecord(${record.id})" title="删除此记录并扣回积分">✕</button></div>`;
            }).join('');
        }

        function filterRecords(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderRecords();
        }

        // 更新统计
        function updateStats() {
            const totalEarned = records.reduce((sum, r) => sum + r.points, 0);
            const pts = getPoints();
            const availablePoints = (pts !== null && pts >= 0) ? pts : totalEarned;
            document.getElementById('totalPoints').textContent = availablePoints;
            document.getElementById('totalTasks').textContent = records.length;
            document.getElementById('totalEarnedDisplay').textContent = totalEarned;

            const today = new Date().toDateString();
            const todayPoints = records.filter(r => new Date(r.time).toDateString() === today).reduce((sum, r) => sum + r.points, 0);
            document.getElementById('todayPoints').textContent = todayPoints;

            const streak = calculateStreak();
            document.getElementById('streak').textContent = streak;

            const progress = Math.min((availablePoints / settings.targetPoints) * 100, 100);
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressPercent').textContent = Math.round(progress) + '%';
            document.getElementById('progressText').textContent = progress >= 100 ? '🎉 已达成目标！' : `距离「${settings.rewardText}」还需 ${settings.targetPoints - availablePoints} 积分`;

            const select = document.getElementById('taskSelect');
            select.innerHTML = '<option value="">请选择...</option>' + goals.map(g => `<option value="${g.id}">${g.icon} ${g.name} (+${g.points})</option>`).join('');
        }

        function calculateStreak() {
            if (records.length === 0) return 0;
            const dates = [...new Set(records.map(r => new Date(r.time).toDateString()))];
            dates.sort((a, b) => new Date(b) - new Date(a));
            const today = new Date(); today.setHours(0, 0, 0, 0);
            let streak = 0, checkDate = new Date(today);
            for (let i = 0; i < dates.length; i++) {
                const recordDate = new Date(dates[i]); recordDate.setHours(0, 0, 0, 0);
                if (recordDate.getTime() === checkDate.getTime() || recordDate.getTime() === checkDate.getTime() - 86400000) {
                    streak++; checkDate = new Date(recordDate);
                } else break;
            }
            return streak;
        }

        // 模态框
        function openGoalModal() {
            document.getElementById('goalModal').classList.add('active');
            document.getElementById('goalForm').reset();
            document.querySelectorAll('.icon-option').forEach(i => i.classList.remove('selected'));
            document.querySelector('.icon-option').classList.add('selected');
        }
        function closeGoalModal() { document.getElementById('goalModal').classList.remove('active'); }
        function openCompleteModal() {
            if (goals.length === 0) { alert('请先添加目标！'); return; }
            document.getElementById('completeModal').classList.add('active');
            setDefaultDateTime();
        }
        function closeCompleteModal() { document.getElementById('completeModal').classList.remove('active'); }
        function openSettingsModal() {
            document.getElementById('settingsModal').classList.add('active');
            document.getElementById('targetPoints').value = settings.targetPoints;
            document.getElementById('rewardText').value = settings.rewardText;
        }
        function closeSettingsModal() { document.getElementById('settingsModal').classList.remove('active'); }

        // 保存目标
        function saveGoal(e) {
            e.preventDefault();
            const name = document.getElementById('goalName').value.trim();
            const points = parseInt(document.getElementById('goalPoints').value);
            const icon = document.querySelector('.icon-option.selected').dataset.icon;
            goals.push({ id: Date.now(), name, points, icon });
            saveData();
            renderGoals();
            updateStats();
            closeGoalModal();
            showSuccess('🎯');
        }

        function deleteGoal(id) {
            if (confirm('确定要删除这个目标吗？')) {
                goals = goals.filter(g => g.id !== id);
                saveData();
                renderGoals();
                updateStats();
            }
        }

        // 删除完成记录（扣回积分）
        function deleteRecord(recordId) {
            const record = records.find(r => r.id === recordId);
            if (!record) return;
            if (!confirm(`确定要删除这条记录吗？\n\n${record.name}  +${record.points}分\n\n积分将被扣回。`)) return;
            records = records.filter(r => r.id !== recordId);
            if (typeof deductPoints === 'function') {
                deductPoints(record.points);
            } else {
                const pts = getPoints();
                if (pts !== null) setPoints(Math.max(0, pts - record.points));
            }
            saveData();
            renderRecords();
            renderGoals();
            updateStats();
        }

        // 快速完成任务（+积分到服务端）
        function quickComplete(goalId) {
            const goal = goals.find(g => g.id === goalId);
            if (!goal) return;
            if (isTaskCompletedToday(goalId)) {
                alert('该任务今日已完成，明天再来吧！');
                return;
            }
            if (typeof addTaskRecord === 'function') {
                addTaskRecord(goal);  // 内部已 push 记录 + 加积分
            } else {
                records.push({ id: Date.now(), goalId: goal.id, name: goal.name, points: goal.points, icon: goal.icon, time: new Date().toISOString(), note: '' });
            }
            saveData();
            renderRecords();
            updateStats();
            showSuccess('✅');
        }

        function saveRecord(e) {
            e.preventDefault();
            const goalId = parseInt(document.getElementById('taskSelect').value);
            const goal = goals.find(g => g.id === goalId);
            if (!goal) return;
            const time = document.getElementById('completeTime').value;
            const note = document.getElementById('recordNote').value.trim();
            const record = { id: Date.now(), goalId: goal.id, name: goal.name, points: goal.points, icon: goal.icon, time: new Date(time).toISOString(), note };
            records.push(record);
            if (typeof addPoints === 'function') addPoints(goal.points);
            saveData();
            renderRecords();
            updateStats();
            closeCompleteModal();
            showSuccess('🎉');
        }

        function saveSettings(e) {
            e.preventDefault();
            settings.targetPoints = parseInt(document.getElementById('targetPoints').value);
            settings.rewardText = document.getElementById('rewardText').value.trim() || '神秘奖励';
            saveData();
            updateStats();
            closeSettingsModal();
        }

        function showSuccess(emoji) {
            const el = document.createElement('div');
            el.className = 'success-animation';
            el.textContent = emoji;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 600);
        }

        // 导出全量备份（从服务端获取最新数据）
        function exportData() {
            const data = getFullExportData();
            if (!data) { alert('数据未加载'); return; }
            data.exportTime = new Date().toISOString();
            data.version = '2.0';
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const date = new Date();
            const dateStr = `${date.getFullYear()}${(date.getMonth()+1).toString().padStart(2,'0')}${date.getDate().toString().padStart(2,'0')}`;
            const a = document.createElement('a');
            a.href = url; a.download = `全量备份_${dateStr}.json`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            URL.revokeObjectURL(url);
            document.getElementById('lastBackupTime').textContent = `上次导出: ${date.toLocaleString('zh-CN')}`;
            showSuccess('📤');
        }

        // 导入全量备份
        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    const recordsCount = data.tracker?.records?.length || data.records?.length || 0;
                    if (!confirm(`确定恢复备份？\n⭐ 积分: ${data.sharedPoints ?? '未知'}\n📝 记录: ${recordsCount}\n⚠️ 将覆盖所有数据！`)) { event.target.value = ''; return; }
                    const res = await fetch('/api/data', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                    if (!res.ok) throw new Error('Server error ' + res.status);
                    alert('✅ 恢复成功！页面将刷新。');
                    location.reload();
                } catch (err) {
                    alert('❌ 恢复失败: ' + err.message);
                }
                event.target.value = '';
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
